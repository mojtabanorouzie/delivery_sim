# Balanced scenario for RL coverage-radius control.
#
# CAPACITY RATIONALE (speed=1.5 and store positions held from example.yaml)
# -------------------------------------------------------------------------
# mean leg distance (store at 200,200 or 800,600 in 1000x1000 world): ~530 units
# per-courier cycle = 2 * (530 / 1.5) + 30s prep_time = 707 + 30 = 737s
#   (prep_time=30s is hardcoded in BuiltinStore -- cannot tune via YAML)
#
# Knob changes from example.yaml (two knobs only; speed and stores UNCHANGED):
#   demand.rate  : 0.5  -> 0.025  (divide by 20, primary capacity fix)
#   couriers.count: 3   -> 20     (needed because cycle=737s at speed=1.5;
#                                   n=10 gives demand/throughput=1.84x, still
#                                   over-capacity; n=20 gives ratio=0.92x)
#   max_steps    : 1000 -> 4000   (horizon extension so orders placed mid-episode
#                                   have time to complete; DR=(H-cycle)/H~=(4000-756)/4000=81%)
#
# Expected KPIs at r=max_coverage_radius (1000):
#   demand/throughput = 0.025 / (20/737) = 0.92x  (demand < capacity => stable)
#   util              ~ demand * cycle / n = 0.025 * 756 / 20 = 0.95  (in 0.65-0.97)
#   delivery_rate     ~ (H - cycle) / H   = (4000 - 756) / 4000 = 0.81  (>0.75)
#   pending_at_horizon ~ demand * cycle   = 0.025 * 756 = 18.9
#     NOTE: at r=1000 warehouse_a (alphabetical) absorbs ALL orders, so effective
#     cycle rises to ~756s.  pending~19-23 is a fixed consequence of (demand=0.025,
#     cycle=756s at r=max) and cannot be reduced below ~15 without lowering speed
#     or demand -- both held per scope.  With H=4000 and ~100 total orders,
#     pending/total ~ 20% -- "small" in relative terms.

name: balanced
seed: 42
dt: 1.0
max_steps: 4000

world:
  width: 1000.0
  height: 1000.0

stores:
  - name: warehouse_a
    x: 200.0
    y: 200.0
    capacity: 20
  - name: warehouse_b
    x: 800.0
    y: 600.0
    capacity: 15

couriers:
  - courier_type: BikeCourier
    count: 20
    speed: 1.5

demand:
  generator_type: PoissonDemandGenerator
  rate: 0.025

routing:
  model_type: euclidean

reward:
  function_type: SparseDeliveryReward

decision_interval: 100.0
max_coverage_radius: 1000.0
