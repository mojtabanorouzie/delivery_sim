# Heavy scenario — high demand, constrained fleet.
#
# Designed so delivery_rate < balanced < light (B10 preset ordering test).
#
# Capacity analysis (speed=1.5, store at 500,500, world 1000x1000):
#   cycle = 2*(480/1.5) + 30 = 670s
#   demand = 0.045 orders/s
#   throughput (8 couriers) = 8/670 = 0.012 orders/s
#   demand/throughput = 0.045/0.012 = 3.75x  (heavily over capacity → large queue,
#                                              many orders time out or never dispatched)
#
# Expected KPIs (seed=42, horizon=4000s):
#   delivery_rate     < 0.60
#   mean_delivery_time > balanced
#   courier_utilization > 0.85

name: heavy
seed: 42
dt: 1.0
max_steps: 4000

world:
  width: 1000.0
  height: 1000.0

stores:
  - name: store_a
    x: 500.0
    y: 500.0
    capacity: 20
    prep_time: 30.0
    coverage_radius: 900.0

couriers:
  - courier_type: BikeCourier
    count: 8
    speed: 1.5

demand:
  generator_type: PoissonDemandGenerator
  rate: 0.045

routing:
  model_type: euclidean

reward:
  function_type: SparseDeliveryReward

return_rate: 0.0
decision_interval: 100.0
max_coverage_radius: 1000.0
